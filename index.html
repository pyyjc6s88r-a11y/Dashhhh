<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="My Dashboard"/>
  <meta name="theme-color" content="#ffffff"/>
  <title>My Dashboard</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Serif+Text:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#ffffff;--surface:#f9f9f9;--border:#e8e8e8;--border-strong:#c8c8c8;
      --text:#111111;--text2:#555555;--text3:#aaaaaa;--acc-soft:#f5f5f5;
      --green:#2d6a4f;--red:#9b2335;--amber:#8a6200;
      --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:'DM Serif Text',Georgia,serif;font-weight:400;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:calc(var(--safe-bottom)+72px)}
    #app{max-width:640px;margin:0 auto;padding:0 24px}

    .header{padding:calc(var(--safe-top)+28px) 0 20px;display:flex;align-items:baseline;justify-content:space-between;border-bottom:1px solid var(--border);margin-bottom:32px}
    .header h1{font-family:'DM Serif Display',Georgia,serif;font-size:26px;font-weight:400;color:var(--text);letter-spacing:-.3px;font-style:italic}
    .header-right{display:flex;align-items:center;gap:10px}
    .date-label{font-size:13px;color:var(--text3);font-style:italic}
    .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);transition:background .3s;flex-shrink:0}
    .sync-dot.syncing{background:var(--amber)}.sync-dot.synced{background:var(--green)}.sync-dot.error{background:var(--red)}

    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;padding:10px 0 calc(var(--safe-bottom)+6px);z-index:100}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;cursor:pointer;padding:4px 2px;color:var(--text3);font-size:10px;font-family:'DM Serif Text',serif;font-style:italic;transition:color .2s}
    .nav-btn.active{color:var(--text)}
    .nav-icon{font-size:16px;line-height:1}
    .nav-pip{width:3px;height:3px;border-radius:50%;background:transparent;margin:0 auto;transition:background .2s}
    .nav-btn.active .nav-pip{background:var(--text)}

    .view{display:none}.view.on{display:block}

    .ai-banner{border:1px solid var(--border);padding:18px 20px;margin-bottom:28px;display:flex;align-items:flex-start;gap:16px}
    .ai-inner{flex:1}
    .ai-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
    .ai-text{font-size:14px;color:var(--text2);line-height:1.65;font-style:italic}
    .ai-btn{flex-shrink:0;padding:8px 16px;border:1px solid var(--border-strong);background:var(--bg);color:var(--text);font-size:12px;cursor:pointer;font-family:'DM Serif Text',serif;font-style:italic;transition:background .15s}
    .ai-btn:hover{background:var(--acc-soft)}

    .stat-strip{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--border);overflow:hidden;margin-bottom:28px}
    .stat-cell{padding:18px 8px;text-align:center;border-right:1px solid var(--border);cursor:pointer;transition:background .15s}
    .stat-cell:last-child{border-right:none}
    .stat-cell:hover{background:var(--acc-soft)}
    .stat-val{font-family:'DM Serif Display',serif;font-size:21px;font-weight:400;color:var(--text);line-height:1}
    .stat-label{font-size:10px;color:var(--text3);margin-top:5px;font-style:italic}

    .sec-label{font-family:'DM Serif Display',serif;font-size:20px;font-weight:400;color:var(--text);margin-bottom:20px;font-style:italic}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
    @media(max-width:520px){.two-col{grid-template-columns:1fr}}

    .card{border:1px solid var(--border);padding:20px;margin-bottom:16px}
    .card-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
    .see-all{font-size:12px;color:var(--text2);cursor:pointer;background:none;border:none;font-family:'DM Serif Text',serif;font-style:italic;letter-spacing:0;text-transform:none;transition:opacity .15s}
    .see-all:hover{opacity:.5}

    .task-row{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
    .task-row:last-of-type{border-bottom:none}
    .task-cb{width:16px;height:16px;border-radius:50%;border:1px solid var(--border-strong);flex-shrink:0;margin-top:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;background:var(--bg)}
    .task-cb.done{background:var(--text);border-color:var(--text)}
    .task-cb.done::after{content:'✓';color:white;font-size:9px}
    .task-txt{flex:1;font-size:14px;color:var(--text);line-height:1.5}
    .task-txt.done{text-decoration:line-through;color:var(--text3)}
    .pri{font-size:9px;padding:2px 8px;flex-shrink:0;border:1px solid var(--border);color:var(--text3);font-style:italic}
    .pri-high{border-color:#ddbdbd;color:#7a3030}
    .pri-med{border-color:var(--border)}
    .pri-low{border-color:#b8d4b8;color:#2d6a4f}

    .goal-row{padding:10px 0;border-bottom:1px solid var(--border)}
    .goal-row:last-of-type{border-bottom:none}
    .goal-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:7px}
    .goal-name{font-size:14px;color:var(--text)}
    .goal-pct{font-size:11px;color:var(--text3);font-style:italic}
    .pbar{height:1px;background:var(--border);overflow:hidden}
    .pbar-fill{height:100%;background:var(--text);transition:width .3s}

    .habit-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px}
    .habit-name{font-size:14px;color:var(--text)}
    .streak{font-size:11px;color:var(--text2);font-style:italic}
    .wk-dots{display:flex;gap:6px}
    .wk-dot{flex:1;max-width:40px;aspect-ratio:1;border-radius:50%;border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:8px;color:var(--text3);transition:all .2s;background:var(--bg)}
    .wk-dot.done{background:var(--text);border-color:var(--text);color:var(--bg)}
    .wk-dot.today{border-color:var(--border-strong)}

    .achv-row{display:flex;align-items:baseline;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
    .achv-row:last-of-type{border-bottom:none}
    .achv-ic{font-size:12px;flex-shrink:0}
    .achv-txt{flex:1;font-size:14px;color:var(--text)}
    .achv-date{font-size:10px;color:var(--text3);white-space:nowrap;font-style:italic}

    .j-entry{padding:10px 0;border-bottom:1px solid var(--border)}
    .j-entry:last-of-type{border-bottom:none}
    .j-date{font-size:10px;color:var(--text3);font-style:italic;margin-bottom:4px}
    .j-body{font-size:14px;color:var(--text);line-height:1.65;font-style:italic}

    .cal-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .cal-nav-btn{background:none;border:1px solid var(--border);padding:5px 12px;cursor:pointer;font-size:14px;color:var(--text2)}
    .cal-month{font-family:'DM Serif Display',serif;font-size:16px;font-weight:400;color:var(--text);font-style:italic}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
    .cal-dl{text-align:center;font-size:10px;color:var(--text3);padding:4px 0;font-style:italic}
    .cal-day{min-height:36px;padding:4px 2px;cursor:default;text-align:center;transition:background .15s}
    .cal-day.has-ev{cursor:pointer}.cal-day.has-ev:hover,.cal-day.sel{background:var(--acc-soft)}
    .cal-dn{font-size:12px;color:var(--text2)}
    .cal-day.today .cal-dn{background:var(--text);color:white;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin:0 auto}
    .cal-day.om .cal-dn{color:var(--text3)}
    .cal-dot{width:3px;height:3px;border-radius:50%;background:var(--text3);margin:2px auto 0}
    .ev-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
    .ev-item:last-of-type{border-bottom:none}
    .ev-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:7px;background:var(--border-strong)}
    .ev-title{font-size:14px;color:var(--text)}
    .ev-time{font-size:11px;color:var(--text3);font-style:italic;margin-top:2px}

    .book-shelf{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:16px;padding:4px 0}
    .book-card{position:relative;cursor:pointer;transition:opacity .2s}
    .book-card:hover{opacity:.75}
    .book-cover{width:100%;aspect-ratio:2/3;object-fit:cover;border:1px solid var(--border);display:block}
    .book-badge{position:absolute;top:5px;left:5px;font-size:9px;padding:2px 7px;background:rgba(17,17,17,.6);color:white;font-style:italic}
    .book-del{position:absolute;top:4px;right:4px;background:rgba(17,17,17,.5);border:none;color:white;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;display:none;align-items:center;justify-content:center}
    .book-card:hover .book-del,.book-card:active .book-del{display:flex}
    .bc-title{font-size:11px;color:var(--text);margin-top:6px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-style:italic}
    .bc-author{font-size:10px;color:var(--text3);margin-top:2px}
    .no-cover{width:100%;aspect-ratio:2/3;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px}
    .bk-prog{margin-top:5px;height:1px;background:var(--border);overflow:hidden}
    .bk-prog-f{height:100%;background:var(--text)}
    .btype-row{display:flex;gap:8px;overflow-x:auto;margin-bottom:18px}
    .btype-btn{padding:6px 16px;border:1px solid var(--border);font-size:12px;cursor:pointer;background:var(--bg);color:var(--text3);white-space:nowrap;font-family:'DM Serif Text',serif;font-style:italic;flex-shrink:0;transition:all .15s}
    .btype-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
    .book-results{display:flex;gap:10px;overflow-x:auto;margin-bottom:16px}
    .book-res{flex-shrink:0;width:68px;cursor:pointer;transition:opacity .15s}
    .book-res:hover{opacity:.7}
    .book-res img{width:68px;height:100px;object-fit:cover;border:1px solid var(--border);display:block}
    .br-title{font-size:10px;color:var(--text2);margin-top:4px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-style:italic}

    .fin-strip{display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--border);overflow:hidden;margin-bottom:16px}
    .fin-cell{padding:18px 10px;text-align:center;border-right:1px solid var(--border)}
    .fin-cell:last-child{border-right:none}
    .fin-val{font-family:'DM Serif Display',serif;font-size:18px;font-weight:400;line-height:1}
    .fin-lbl{font-size:10px;margin-top:5px;color:var(--text3);font-style:italic}
    .tx-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
    .tx-row:last-of-type{border-bottom:none}
    .tx-ic{font-size:16px;flex-shrink:0}
    .tx-name{flex:1;font-size:14px;color:var(--text)}
    .tx-cat{font-size:10px;color:var(--text3);font-style:italic}
    .tx-amt{font-size:13px;white-space:nowrap;font-family:'DM Serif Display',serif}
    .tx-amt.inc{color:var(--green)}.tx-amt.exp{color:var(--red)}
    .cat-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:12px}
    .cat-chip{padding:5px 12px;border:1px solid var(--border);font-size:11px;cursor:pointer;white-space:nowrap;background:var(--bg);color:var(--text3);font-style:italic;flex-shrink:0;transition:all .15s}
    .cat-chip.active{background:var(--text);color:var(--bg);border-color:var(--text)}
    .bud-row{margin-bottom:12px}
    .bud-top{display:flex;justify-content:space-between;margin-bottom:5px;font-size:12px;color:var(--text2);font-style:italic}

    .health-strip{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--border);overflow:hidden;margin-bottom:16px}
    .hm{padding:16px 8px;text-align:center;border-right:1px solid var(--border)}
    .hm:last-child{border-right:none}
    .hm-icon{font-size:16px;margin-bottom:5px}
    .hm-val{font-family:'DM Serif Display',serif;font-size:20px;font-weight:400;color:var(--text)}
    .hm-lbl{font-size:9px;color:var(--text3);margin-top:4px;font-style:italic}
    .score-wrap{position:relative;width:46px;height:46px;margin:0 auto 5px}
    .score-wrap svg{transform:rotate(-90deg)}
    .score-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:12px;color:var(--text)}
    .hl-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
    .hl-row:last-of-type{border-bottom:none}
    .hl-date{font-size:12px;color:var(--text2);font-style:italic}
    .hl-stats{display:flex;gap:14px}
    .hl-s{text-align:center}
    .hl-sv{font-size:12px;color:var(--text);font-family:'DM Serif Display',serif}
    .hl-sl{font-size:9px;color:var(--text3);font-style:italic}

    input[type=text],input[type=number],input[type=date],textarea,select{
      font-family:'DM Serif Text',serif;font-size:14px;padding:9px 13px;
      border:1px solid var(--border);background:var(--bg);color:var(--text);
      outline:none;width:100%;transition:border-color .2s;font-style:italic}
    input:focus,textarea:focus{border-color:var(--border-strong)}
    select{width:auto}input[type=range]{width:70px;accent-color:var(--text)}
    textarea{resize:none;min-height:80px;width:100%}
    .inp-row{display:flex;gap:8px;margin-top:12px;align-items:center}
    .inp-row input[type=text]{flex:1}
    .btn{padding:9px 20px;border:1px solid var(--text);font-size:13px;cursor:pointer;background:var(--text);color:var(--bg);font-family:'DM Serif Text',serif;font-style:italic;white-space:nowrap;transition:opacity .15s}
    .btn:hover{opacity:.75}
    .btn-ghost{background:var(--bg);color:var(--text2);border-color:var(--border)}
    .del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:0 0 0 8px;flex-shrink:0;transition:color .15s}
    .del:hover{color:var(--red)}
    .empty{font-size:13px;color:var(--text3);font-style:italic;padding:6px 0}

    .sync-banner{position:fixed;bottom:calc(var(--safe-bottom)+80px);left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);font-size:12px;padding:8px 20px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap;font-style:italic}
    .sync-banner.show{opacity:1}

    .scope-toggle{display:flex;border:1px solid var(--border);overflow:hidden;margin-bottom:22px}
    .scope-btn{flex:1;padding:9px;font-size:13px;border:none;background:none;color:var(--text3);cursor:pointer;transition:all .2s;font-family:'DM Serif Text',serif;font-style:italic;border-right:1px solid var(--border)}
    .scope-btn:last-child{border-right:none}
    .scope-btn.active{background:var(--text);color:var(--bg)}
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>My Dashboard</h1>
    <div class="header-right">
      <span class="date-label" id="hdate"></span>
      <div class="sync-dot" id="sync-dot"></div>
    </div>
  </div>

  <div id="view-home" class="view on"></div>
  <div id="view-tasks" class="view"></div>
  <div id="view-calendar" class="view"></div>
  <div id="view-books" class="view"></div>
  <div id="view-habits" class="view"></div>
  <div id="view-finance" class="view"></div>
  <div id="view-health" class="view"></div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" onclick="go('home')" id="nav-home"><span class="nav-icon">⌂</span><div class="nav-pip"></div>Home</button>
  <button class="nav-btn" onclick="go('tasks')" id="nav-tasks"><span class="nav-icon">○</span><div class="nav-pip"></div>Tasks</button>
  <button class="nav-btn" onclick="go('calendar')" id="nav-calendar"><span class="nav-icon">◻</span><div class="nav-pip"></div>Calendar</button>
  <button class="nav-btn" onclick="go('books')" id="nav-books"><span class="nav-icon">▱</span><div class="nav-pip"></div>Reading</button>
  <button class="nav-btn" onclick="go('habits')" id="nav-habits"><span class="nav-icon">◈</span><div class="nav-pip"></div>Habits</button>
  <button class="nav-btn" onclick="go('finance')" id="nav-finance"><span class="nav-icon">◇</span><div class="nav-pip"></div>Finance</button>
  <button class="nav-btn" onclick="go('health')" id="nav-health"><span class="nav-icon">◯</span><div class="nav-pip"></div>Health</button>
</nav>
<div class="sync-banner" id="sync-banner">saved</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const SB_URL='https://ukhoanhmdxkydmxoqyxf.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVraG9hbmhtZHhreWRteG9xeXhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MTk0NjYsImV4cCI6MjA5NTQ5NTQ2Nn0.ALMctArtpNdJF42emjg0aRzCNIJGxTL2gVHoBsHCW7g';
const ICAL=`https://api.allorigins.win/get?url=${encodeURIComponent('https://p176-caldav.icloud.com/published/2/NDU1MjQ4ODY3NDU1MjQ4OGgPF2Ah3xFpbe8j89hLf2tyeQHIU2rRV4joGDh9hFVh')}`;
const TX_CATS=['🏠 Housing','🚗 Transport','🍔 Food','💊 Health','🎉 Fun','💼 Work','📱 Subscriptions','💸 Other'];
const TX_ICONS={'🏠 Housing':'🏠','🚗 Transport':'🚗','🍔 Food':'🍔','💊 Health':'💊','🎉 Fun':'🎉','💼 Work':'💼','📱 Subscriptions':'📱','💸 Other':'💸','💰 Income':'💰'};
const WK=['S','M','T','W','T','F','S'];
const ACHV_IC=['✦','❀','◈','✿','❧','◇','❋'];

// ── State ─────────────────────────────────────────────────────────────────────
// Single "personal" scope only — work tab removed
let S={
  personal:{tasks:[],goals:[],achievements:[],journal:[]},
  books:[],habits:[],
  finance:{transactions:[],budgets:[]},
  health:[]
};
let nav='home', bookType='all', finCat='All';
let calEvs=[], calDate=new Date(), calSel=null, calLoaded=false;
let bookRes=[], saveTimer=null;

const $=id=>document.getElementById(id);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const todayStr=()=>new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
const isoToday=()=>new Date().toISOString().slice(0,10);
const DOW=()=>new Date().getDay();
const wkKey=()=>{const d=new Date(),m=new Date(d);m.setDate(d.getDate()-d.getDay());return m.toISOString().slice(0,10)};
const $M=n=>'$'+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});

$('hdate').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

// ── Storage: localStorage first, Supabase for cross-device sync ───────────────
const LS_KEY='dashboard_v1';
const SS=s=>$('sync-dot').className='sync-dot '+s;

// Save to localStorage immediately — this is the primary storage
function saveLocal(){
  try{
    localStorage.setItem(LS_KEY, JSON.stringify(S));
  }catch(e){console.warn('localStorage save failed',e)}
}

// Load from localStorage first (instant), then check Supabase for newer data
function loadLocal(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(raw){
      const parsed=JSON.parse(raw);
      // Merge carefully so missing keys don't break anything
      if(parsed.personal) S.personal=parsed.personal;
      if(parsed.books) S.books=parsed.books;
      if(parsed.habits) S.habits=parsed.habits;
      if(parsed.finance) S.finance=parsed.finance;
      if(parsed.health) S.health=parsed.health;
    }
  }catch(e){console.warn('localStorage load failed',e)}
}

async function syncFromCloud(){
  SS('syncing');
  try{
    const r=await fetch(`${SB_URL}/rest/v1/dashboard?select=*`,{
      headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY}
    });
    if(!r.ok) throw new Error('fetch failed');
    const rows=await r.json();
    if(Array.isArray(rows) && rows.length>0){
      rows.forEach(row=>{
        if(row.scope==='personal'&&row.data) S.personal=row.data;
        else if(['books','habits','finance','health'].includes(row.scope)&&row.data) S[row.scope]=row.data;
      });
      saveLocal(); // update local with cloud data
    }
    SS('synced');
  }catch(e){
    SS('error');
    console.warn('Cloud sync failed, using local data',e);
  }
  renderAll();
}

async function saveToCloud(){
  try{
    for(const sc of['personal','books','habits','finance','health']){
      const data=sc==='personal'?S.personal:S[sc];
      await fetch(`${SB_URL}/rest/v1/dashboard`,{
        method:'POST',
        headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':'application/json',Prefer:'resolution=merge-duplicates'},
        body:JSON.stringify({id:sc,scope:sc,data,updated_at:new Date().toISOString()})
      });
    }
    SS('synced');
    const b=$('sync-banner');b.classList.add('show');setTimeout(()=>b.classList.remove('show'),2000);
  }catch(e){
    console.warn('Cloud save failed, data is safe locally',e);
    SS('error');
  }
}

// sched: save to localStorage IMMEDIATELY, then queue a cloud sync
let cloudTimer=null;
const sched=()=>{
  saveLocal(); // instant — never loses data
  SS('syncing');
  clearTimeout(cloudTimer);
  cloudTimer=setTimeout(saveToCloud, 1500); // cloud after 1.5s idle
};

// Boot: load local instantly, then try to pull newer data from cloud
async function load(){
  loadLocal();  // show data immediately from localStorage
  renderAll();  // render right away with local data
  await syncFromCloud(); // then sync from cloud in background
}

function dailyQuote(){
  const d=new Date();
  const idx=(d.getFullYear()*366+d.getMonth()*31+d.getDate())%QUOTES.length;
  return QUOTES[idx];
}

function timeProgress(){
  const now=new Date();
  const y=now.getFullYear(),mo=now.getMonth(),d=now.getDate(),h=now.getHours(),mi=now.getMinutes();
  const startOfYear=new Date(y,0,1),endOfYear=new Date(y+1,0,1);
  const dayOfYear=Math.floor((now-startOfYear)/86400000)+1;
  const daysInYear=Math.round((endOfYear-startOfYear)/86400000);
  const daysInMonth=new Date(y,mo+1,0).getDate();
  const dow=now.getDay();
  const startOfQ=new Date(y,[0,3,6,9][Math.floor(mo/3)],1);
  const endOfQ=new Date(y,[0,3,6,9][Math.floor(mo/3)]+3,1);
  return[
    {label:'Year',val:`${dayOfYear}/${daysInYear}`,pct:Math.round(dayOfYear/daysInYear*100)},
    {label:'Month',val:`${d}/${daysInMonth}`,pct:Math.round(d/daysInMonth*100)},
    {label:'Week',val:`${dow===0?7:dow}/7`,pct:Math.round((dow===0?7:dow)/7*100)},
    {label:'Day',val:`${h}:${String(mi).padStart(2,'0')}`,pct:Math.round((h*60+mi)/(24*60)*100)},
    {label:'Quarter',val:`${Math.floor((now-startOfQ)/86400000)+1}/${Math.round((endOfQ-startOfQ)/86400000)}`,pct:Math.min(100,Math.round((now-startOfQ)/(endOfQ-startOfQ)*100))},
  ];
}

  const evs=[];
  const lines=txt.replace(/\r\n/g,'\n').replace(/\r/g,'\n').replace(/\n /g,'').split('\n');
  let ev=null;
  for(const l of lines){
    if(l==='BEGIN:VEVENT')ev={};
    else if(l==='END:VEVENT'&&ev){if(ev.start&&ev.title)evs.push(ev);ev=null}
    else if(ev){
      if(l.startsWith('SUMMARY:'))ev.title=l.slice(8).trim();
      else if(l.startsWith('LOCATION:'))ev.location=l.slice(9).trim();
      else if(l.startsWith('DTSTART')){
        const v=l.split(':').slice(1).join(':');if(!v)continue;
        const y=v.slice(0,4),mo=v.slice(4,6),d=v.slice(6,8),ad=v.length===8;
        ev.allDay=ad;
        ev.start=ad?new Date(+y,+mo-1,+d):new Date(+y,+mo-1,+d,+(v.slice(9,11)||0),+(v.slice(11,13)||0));
      }
      else if(l.startsWith('DTEND')){
        const v=l.split(':').slice(1).join(':');if(!v)continue;
        const y=v.slice(0,4),mo=v.slice(4,6),d=v.slice(6,8),ad=v.length===8;
        ev.end=ad?new Date(+y,+mo-1,+d):new Date(+y,+mo-1,+d,+(v.slice(9,11)||0),+(v.slice(11,13)||0));
      }
    }
  }
  return evs.sort((a,b)=>a.start-b.start);
}
async function loadCal(){
  try{const r=await fetch(ICAL);const d=await r.json();calEvs=parseICal(d.contents||'');}catch(e){calEvs=[];}
  calLoaded=true;
  if(nav==='calendar')rCal();else rHome();
}
function rCal(){
  const el=$('view-calendar');if(!el)return;
  if(!calLoaded){el.innerHTML='<div class="section-title">Calendar</div><div class="card"><div class="empty">loading…</div></div>';loadCal();return;}
  const now=new Date(),y=calDate.getFullYear(),mo=calDate.getMonth();
  const sel=calSel||now;
  const selEvs=calEvs.filter(e=>{const d=e.start;return d.getFullYear()===sel.getFullYear()&&d.getMonth()===sel.getMonth()&&d.getDate()===sel.getDate()});
  const first=new Date(y,mo,1).getDay(),days=new Date(y,mo+1,0).getDate();
  let cells='';
  for(let i=0;i<first;i++){const p=new Date(y,mo,-(first-1-i));cells+=`<div class="cal-day om"><div class="cal-dn">${p.getDate()}</div></div>`;}
  for(let d=1;d<=days;d++){
    const isT=now.getFullYear()===y&&now.getMonth()===mo&&now.getDate()===d;
    const isS=sel.getFullYear()===y&&sel.getMonth()===mo&&sel.getDate()===d;
    const hasEv=calEvs.some(e=>e.start.getFullYear()===y&&e.start.getMonth()===mo&&e.start.getDate()===d);
    cells+=`<div class="cal-day${isT?' today':''}${hasEv?' has-ev':''}${isS?' sel':''}" onclick="calSel=new Date(${y},${mo},${d});rCal()">
      <div class="cal-dn">${d}</div>${hasEv?'<div class="cal-dot"></div>':''}
    </div>`;
  }
  el.innerHTML=`
    <div class="section-title">Calendar</div>
    <div class="card" style="margin-bottom:14px">
      <div class="cal-nav-row">
        <button class="cal-nav-btn" onclick="calDate=new Date(${y},${mo-1},1);rCal()">‹</button>
        <span class="cal-month">${calDate.toLocaleDateString('en-US',{month:'long',year:'numeric'})}</span>
        <button class="cal-nav-btn" onclick="calDate=new Date(${y},${mo+1},1);rCal()">›</button>
      </div>
      <div class="cal-grid">${WK.map(d=>`<div class="cal-dl">${d}</div>`).join('')}${cells}</div>
    </div>
    <div class="card">
      <div class="card-title">${sel.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>
      ${selEvs.length===0?'<div class="empty">no events</div>':selEvs.map(e=>`
        <div class="ev-item"><div class="ev-dot"></div>
          <div><div class="ev-title">${esc(e.title)}</div>
          <div class="ev-time">${e.allDay?'all day':e.start.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}${e.end&&!e.allDay?' – '+e.end.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}):''}</div>
          ${e.location?`<div class="ev-time">📍 ${esc(e.location)}</div>`:''}
          </div>
        </div>`).join('')}
    </div>`;
}

async function searchBooks(){

  try{

    const data=await res.json();bookRes=data.docs||[];
    if(!bookRes.length){r.innerHTML='<div class="empty">no results</div>';return;}
    r.innerHTML=`<div class="book-results">${bookRes.map((b,i)=>{const cv=b.cover_i?`https://covers.openlibrary.org/b/id/${b.cover_i}-M.jpg`:'';return`<div class="book-res" onclick="addBook(${i})"><div class="book-res-img">${cv?`<img src="${esc(cv)}" loading="lazy"/>`:`<div style="height:100%;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:20px">❧</div>`}</div><div class="br-title">${esc(b.title)}</div></div>`;}).join('')}</div>`;

function addBook(i){

  $('bsi').value='';$('bres').innerHTML='';rBooks();sched();
}
function delBook(i){S.books.splice(i,1);rBooks();sched()}

function wkChecks(h){const wk=wkKey();if(!h.weeks)h.weeks={};if(!h.weeks[wk])h.weeks[wk]=[false,false,false,false,false,false,false];return h.weeks[wk]}
function calcStreak(h){if(!h.weeks)return 0;const keys=Object.keys(h.weeks).sort();let s=0;for(let k=keys.length-1;k>=0;k--){if(h.weeks[keys[k]].filter(Boolean).length>=h.target)s++;else break;}return s}
function wkDate(di){const d=new Date(),t=new Date(d);t.setDate(d.getDate()+(di-d.getDay()));return t.getDate()}

function rHabits(){
  const el=$('view-habits'),tod=DOW();
  el.innerHTML=`
    <div class="section-title">Habits</div>
    <div class="card" style="margin-bottom:14px">
      <div class="card-title">add a habit</div>
      <div class="inp-row">
        <input type="text" id="hni" placeholder="e.g. meditate 10 min…" onkeydown="if(event.key==='Enter')addHabit()"/>
        <select id="htgt" style="width:auto">${[3,4,5,6,7].map(n=>`<option value="${n}">${n}×/wk</option>`).join('')}</select>
        <button class="btn" onclick="addHabit()">+</button>
      </div>
    </div>
    ${S.habits.length===0?'<div class="card"><div class="empty">no habits yet</div></div>':
    S.habits.map((h,i)=>{const c=wkChecks(h),done=c.filter(Boolean).length,streak=calcStreak(h);return`
      <div class="card" style="margin-bottom:12px">
        <div class="habit-top">
          <div><div class="habit-name">${esc(h.name)}</div><div style="font-size:11px;color:var(--text3);font-style:italic;margin-top:2px">${h.target}×/week · ${done}/${h.target}</div></div>
          <div style="display:flex;align-items:center;gap:10px"><span class="streak">🔥 ${streak}wk</span><button class="del" onclick="delHabit(${i})">✕</button></div>
        </div>
        <div class="wk-dots">${WK.map((day,di)=>`
          <div class="wk-dot${c[di]?' done':''}${di===tod&&!c[di]?' today':''}" onclick="togHabit(${i},${di})">
            <span>${day}</span><span style="font-size:7px;opacity:.6">${wkDate(di)}</span>
          </div>`).join('')}
        </div>
        <div class="pbar" style="margin-top:10px"><div class="pbar-fill" style="width:${Math.min(100,Math.round(done/h.target*100))}%;background:${done>=h.target?'var(--green)':'var(--sage)'}"></div></div>
      </div>`;}).join('')}`;
}
function addHabit(){const i=$('hni'),t=$('htgt'),n=i.value.trim();if(!n)return;S.habits.push({name:n,target:parseInt(t.value),weeks:{},createdDate:todayStr()});i.value='';rHabits();sched()}
function togHabit(hi,di){const c=wkChecks(S.habits[hi]);c[di]=!c[di];rHabits();if(nav==='home')rHome();sched()}
function delHabit(i){S.habits.splice(i,1);rHabits();sched()}

function addTx(){const n=$('txn').value.trim(),a=parseFloat($('txa').value),d=$('txd').value,t=$('txt').value,c=$('txc').value;if(!n||!a||!d)return;S.finance.transactions.push({name:n,amount:a,date:d,type:t,category:c});$('txn').value='';$('txa').value='';rFinance();sched()}

function scoreRing(score,col){

}

function logHealth(){
  const g=id=>$(id)?.value;
  const entry={date:g('hd')||isoToday(),readinessScore:parseInt(g('hr'))||null,sleepScore:parseInt(g('hss'))||null,sleepHours:parseFloat(g('hsh'))||null,hrv:parseInt(g('hh'))||null,restingHR:parseInt(g('hrr'))||null,steps:parseInt(g('hst'))||null,spo2:parseFloat(g('hsp'))||null,tempDev:parseFloat(g('ht'))||null,weight:parseFloat(g('hw'))||null};
  const ex=S.health.findIndex(e=>e.date===entry.date);
  if(ex>=0)S.health[ex]=entry;else S.health.push(entry);
  S.health.sort((a,b)=>a.date.localeCompare(b.date));
  rHealth();sched();
}
function delHealth(i){S.health.splice(i,1);rHealth();sched()}

// ── Boot ──────────────────────────────────────────────────────────────────────
load();
if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
</script>
