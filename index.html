<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="My Dashboard"/>
  <meta name="theme-color" content="#f0efeb"/>
  <title>My Dashboard</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#f0efeb;--surface:#ffffff;--border:#e0ddd8;--border-strong:#b0ada8;
      --text:#1a1a1a;--text2:#555;--text3:#999;--acc-soft:#e8e4dc;
      --pink:#f4a7b9;--blue:#5b9bd5;
      --green:#2d6a4f;--red:#9b2335;--amber:#8a6200;
      --card-shadow:0 1px 6px rgba(0,0,0,.07);
      --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:'Inter',system-ui,sans-serif;font-weight:400;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:calc(var(--safe-bottom)+72px);font-size:13px}
    .header{padding:calc(var(--safe-top)+14px) 20px 12px;display:flex;align-items:center;justify-content:space-between;background:var(--bg);border-bottom:1px solid var(--border)}
    .header h1{font-size:14px;font-weight:600;color:var(--text);letter-spacing:-.2px}
    .date-lbl{font-size:11px;color:var(--text3)}
    .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);transition:background .3s;display:inline-block;margin-left:6px;vertical-align:middle}
    .sync-dot.syncing{background:var(--amber)}.sync-dot.synced{background:var(--green)}.sync-dot.error{background:var(--red)}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(240,239,235,.96);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;padding:8px 0 calc(var(--safe-bottom)+4px);z-index:100}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;cursor:pointer;padding:4px 2px;color:var(--text3);font-size:9px;font-family:'Inter',sans-serif;font-weight:500;transition:color .2s}
    .nav-btn.active{color:var(--text)}
    .nav-icon{font-size:16px;line-height:1}
    .nav-pip{width:3px;height:3px;border-radius:50%;background:transparent;margin:0 auto;transition:background .2s}
    .nav-btn.active .nav-pip{background:var(--text)}
    .view{display:none}.view.on{display:block}
    /* Week strip */
    .week-strip{padding:12px 20px;border-bottom:1px solid var(--border);overflow-x:auto}
    .week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;min-width:480px}
    .week-day-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
    .week-day-label.today{color:var(--blue);font-weight:700}
    .week-pill{border-radius:3px;padding:4px 7px;font-size:10px;font-weight:500;color:#444;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    /* Home grid */
    .home-grid{display:grid;grid-template-columns:200px 1fr 230px;gap:14px;padding:16px 20px;align-items:start}
    @media(max-width:680px){.home-grid{grid-template-columns:1fr;padding:12px 14px}}
    /* Widget cards */
    .wcard{background:var(--surface);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:var(--card-shadow)}
    .wcard-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
    .wcard-label button,.see-all{font-size:11px;color:var(--text2);background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-weight:500}
    .section-banner{border-radius:4px;padding:5px 10px;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:10px}
    .section-banner.warm{background:#fce8dc}.section-banner.cool{background:#dce8fc}.section-banner.neutral{background:var(--acc-soft)}
    /* Clock */
    .clock-wrap{display:flex;align-items:flex-end;justify-content:center;padding:6px 0}
    .clock-num{font-size:68px;font-weight:700;color:var(--pink);line-height:1;letter-spacing:-4px}
    .clock-divider{width:1px;background:var(--border);height:62px;margin:0 10px 10px}
    .clock-sub{font-size:11px;font-weight:600;color:var(--pink);letter-spacing:2px;margin-top:5px;text-align:center}
    /* Tasks */
    .t-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border)}
    .t-row:last-of-type{border-bottom:none}
    .t-cb{width:16px;height:16px;border:1.5px solid var(--border-strong);border-radius:3px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;background:#fff}
    .t-cb.ck{background:var(--blue);border-color:var(--blue)}
    .t-cb.ck::after{content:'✓';color:white;font-size:9px;font-weight:700}
    .t-txt{flex:1;font-size:12px;color:var(--text);font-weight:500;letter-spacing:.05px;text-transform:uppercase}
    .t-txt.ck{text-decoration:line-through;color:var(--text3);font-weight:400}
    .pri{font-size:9px;padding:2px 7px;border-radius:3px;border:1px solid var(--border);color:var(--text3);font-weight:500}
    .pri-high{border-color:#ddbdbd;color:#7a3030;background:#fff5f5}
    .pri-low{border-color:#b8d4b8;color:#2d6a4f;background:#f5fff5}
    /* Goals/Habits */
    .g-row,.h-row{padding:8px 0;border-bottom:1px solid var(--border)}
    .g-row:last-of-type,.h-row:last-of-type{border-bottom:none}
    .g-top,.h-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
    .g-name,.h-name{font-size:12px;font-weight:500;color:var(--text)}
    .g-pct,.h-streak{font-size:11px;color:var(--text3)}
    .pbar{height:2px;background:var(--border);border-radius:999px;overflow:hidden}
    .pbar-fill{height:100%;border-radius:999px;background:var(--text);transition:width .3s}
    /* Habit dots */
    .wk-dots{display:flex;gap:4px}
    .wk-dot{flex:1;max-width:34px;aspect-ratio:1;border-radius:50%;border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:8px;color:var(--text3);transition:all .2s;background:#fff;font-weight:600;gap:1px}
    .wk-dot.done{background:var(--text);border-color:var(--text);color:#fff}
    .wk-dot.today{border-color:var(--blue);color:var(--blue)}
    .wk-dot.today.done{background:var(--text);border-color:var(--text);color:#fff}
    /* Achievements */
    .achv-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
    .achv-row:last-of-type{border-bottom:none}
    .achv-ic{font-size:13px;flex-shrink:0}
    .achv-txt{flex:1;font-size:12px;color:var(--text);font-weight:500}
    .achv-date{font-size:10px;color:var(--text3);white-space:nowrap}
    /* Journal */
    .j-entry{padding:9px 0;border-bottom:1px solid var(--border)}
    .j-entry:last-of-type{border-bottom:none}
    .j-date{font-size:10px;color:var(--text3);margin-bottom:3px;font-weight:500}
    .j-body{font-size:13px;color:var(--text);line-height:1.55}
    /* Calendar */
    .cal-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .cal-nav-btn{background:#fff;border:1px solid var(--border);border-radius:6px;padding:5px 12px;cursor:pointer;font-size:14px;color:var(--text2)}
    .cal-month{font-size:14px;font-weight:600;color:var(--text)}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
    .cal-dl{text-align:center;font-size:10px;color:var(--text3);padding:4px 0;font-weight:600}
    .cal-day{min-height:34px;border-radius:6px;padding:4px 2px;cursor:default;text-align:center;transition:background .15s}
    .cal-day.has-ev{cursor:pointer}.cal-day.has-ev:hover,.cal-day.sel{background:var(--acc-soft)}
    .cal-dn{font-size:12px;color:var(--text2);font-weight:400}
    .cal-day.today .cal-dn{background:var(--text);color:white;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin:0 auto;font-weight:600}
    .cal-day.om .cal-dn{color:var(--text3)}
    .cal-dot{width:3px;height:3px;border-radius:50%;background:var(--blue);margin:2px auto 0}
    .ev-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
    .ev-item:last-of-type{border-bottom:none}
    .ev-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px;background:var(--blue)}
    .ev-title{font-size:13px;color:var(--text);font-weight:500}
    .ev-time{font-size:11px;color:var(--text3);margin-top:2px}
    /* Books */
    .book-shelf{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:14px;padding:4px 0}
    .book-card{position:relative;cursor:pointer;transition:opacity .2s}.book-card:hover{opacity:.78}
    .book-cover{width:100%;aspect-ratio:2/3;object-fit:cover;border:1px solid var(--border);border-radius:4px;display:block}
    .book-badge{position:absolute;top:5px;left:5px;font-size:9px;padding:2px 7px;border-radius:3px;background:rgba(17,17,17,.6);color:white;font-weight:500}
    .book-del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.45);border:none;color:white;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;display:none;align-items:center;justify-content:center}
    .book-card:hover .book-del,.book-card:active .book-del{display:flex}
    .bc-title{font-size:11px;color:var(--text);margin-top:5px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-weight:500}
    .bc-author{font-size:10px;color:var(--text3);margin-top:1px}
    .no-cover{width:100%;aspect-ratio:2/3;background:var(--acc-soft);border:1px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:20px}
    .bk-prog{margin-top:5px;height:2px;background:var(--border);border-radius:999px;overflow:hidden}
    .bk-prog-f{height:100%;background:var(--text);border-radius:999px}
    .btype-row{display:flex;gap:6px;overflow-x:auto;margin-bottom:16px}
    .btype-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);font-size:11px;font-weight:500;cursor:pointer;background:#fff;color:var(--text3);white-space:nowrap;font-family:'Inter',sans-serif;flex-shrink:0;transition:all .15s}
    .btype-btn.active{background:var(--text);color:#fff;border-color:var(--text)}
    .book-results{display:flex;gap:10px;overflow-x:auto;margin-bottom:14px}
    .book-res{flex-shrink:0;width:68px;cursor:pointer;transition:opacity .15s}.book-res:hover{opacity:.7}
    .book-res img{width:68px;height:100px;object-fit:cover;border-radius:4px;border:1px solid var(--border);display:block}
    .br-title{font-size:10px;color:var(--text2);margin-top:3px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    /* Finance */
    .fin-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
    .fin-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 10px;text-align:center;box-shadow:var(--card-shadow)}
    .fin-val{font-size:16px;font-weight:700;line-height:1}
    .fin-lbl{font-size:10px;margin-top:4px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.04em}
    .tx-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
    .tx-row:last-of-type{border-bottom:none}
    .tx-ic{font-size:15px;flex-shrink:0}
    .tx-name{flex:1;font-size:13px;color:var(--text);font-weight:500}
    .tx-cat{font-size:10px;color:var(--text3)}
    .tx-amt{font-size:13px;white-space:nowrap;font-weight:600}
    .tx-amt.inc{color:var(--green)}.tx-amt.exp{color:var(--red)}
    .cat-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px}
    .cat-chip{padding:5px 12px;border-radius:20px;border:1px solid var(--border);font-size:11px;cursor:pointer;white-space:nowrap;background:#fff;color:var(--text3);font-family:'Inter',sans-serif;font-weight:500;flex-shrink:0;transition:all .15s}
    .cat-chip.active{background:var(--text);color:#fff;border-color:var(--text)}
    .bud-row{margin-bottom:10px}
    .bud-top{display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px;color:var(--text2);font-weight:500}
    /* Health */
    .health-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
    .hm{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 8px;text-align:center;box-shadow:var(--card-shadow)}
    .hm-icon{font-size:16px;margin-bottom:4px}
    .hm-val{font-size:18px;font-weight:700;color:var(--text)}
    .hm-lbl{font-size:9px;color:var(--text3);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
    .score-wrap{position:relative;width:44px;height:44px;margin:0 auto 4px}
    .score-wrap svg{transform:rotate(-90deg)}
    .score-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text)}
    .hl-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
    .hl-row:last-of-type{border-bottom:none}
    .hl-date{font-size:12px;color:var(--text2);font-weight:500}
    .hl-stats{display:flex;gap:14px}
    .hl-s{text-align:center}
    .hl-sv{font-size:12px;color:var(--text);font-weight:600}
    .hl-sl{font-size:9px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.04em}
    /* Inputs */
    input[type=text],input[type=number],input[type=date],textarea,select{font-family:'Inter',sans-serif;font-size:13px;padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--text);outline:none;width:100%;transition:border-color .2s;font-weight:400}
    input:focus,textarea:focus{border-color:var(--border-strong)}
    select{width:auto}input[type=range]{width:70px;accent-color:var(--text)}
    textarea{resize:none;min-height:72px;width:100%}
    .inp-row{display:flex;gap:8px;margin-top:10px;align-items:center}
    .inp-row input[type=text]{flex:1}
    .btn{padding:8px 18px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:var(--text);color:#fff;font-family:'Inter',sans-serif;white-space:nowrap;transition:opacity .15s}
    .btn:hover{opacity:.8}
    .btn-ghost{background:var(--acc-soft);color:var(--text2);border:1px solid var(--border)}
    .del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:0 0 0 8px;flex-shrink:0;transition:color .15s}
    .del:hover{color:var(--red)}
    .empty{font-size:12px;color:var(--text3);padding:6px 0;font-weight:400}
    /* Detail pages */
    .detail-page{padding:16px 20px;max-width:680px;margin:0 auto}
    .detail-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:20px;letter-spacing:-.3px}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
    @media(max-width:520px){.two-col{grid-template-columns:1fr}}
    .card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px;box-shadow:var(--card-shadow)}
    .card-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
    .see-all{font-size:11px;color:var(--text2);cursor:pointer;background:none;border:none;font-family:'Inter',sans-serif;font-weight:500}
    /* Time progress bars */
    .tp-bar-wrap{display:flex;align-items:center;gap:10px;margin-bottom:9px}
    .tp-bar{flex:1;height:14px;border:1.5px solid #2a2a2a;background:#fff;position:relative;overflow:hidden;border-radius:1px}
    .tp-bar-fill{position:absolute;left:0;top:0;height:100%;background:#2a2a2a;transition:width .4s}
    .tp-label{font-size:11px;color:var(--text2);white-space:nowrap;min-width:110px;font-weight:500}
    /* View toggle */
    .view-toggle{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:12px;background:#fff}
    .vt-btn{flex:1;padding:8px;font-size:11px;font-weight:500;border:none;background:none;color:var(--text3);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;border-right:1px solid var(--border)}
    .vt-btn:last-child{border-right:none}
    .vt-btn.active{background:var(--text);color:#fff}
    /* Scope toggle */
    .scope-toggle{display:flex;background:#fff;border-radius:8px;overflow:hidden;margin-bottom:18px;border:1px solid var(--border)}
    .scope-btn{flex:1;padding:8px;font-size:12px;font-weight:500;border:none;background:none;color:var(--text3);cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;border-right:1px solid var(--border)}
    .scope-btn:last-child{border-right:none}
    .scope-btn.active{background:var(--text);color:#fff}
    /* Sync banner */
    .sync-banner{position:fixed;bottom:calc(var(--safe-bottom)+78px);left:50%;transform:translateX(-50%);background:var(--text);color:#fff;font-size:11px;font-weight:500;padding:7px 18px;border-radius:20px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
    .sync-banner.show{opacity:1}
  </style>
</head>
<body>
<div id="app">

    <h1>My Dashboard <span class="sync-dot" id="sync-dot"></span></h1>
    <span class="date-lbl" id="hdate"></span>
  </div>
  <div id="view-home" class="view on"></div>
  <div id="view-tasks" class="view"></div>

</div>

async function syncFromCloud(){
  SS('syncing');
  try{
    const r=await fetch(`${SB_URL}/rest/v1/dashboard?select=*`,{headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY}});
    if(!r.ok)throw new Error();
    const rows=await r.json();
    if(Array.isArray(rows)&&rows.length>0){rows.forEach(row=>{if(row.scope==='personal'&&row.data)S.personal=row.data;else if(['books','habits','finance','health'].includes(row.scope)&&row.data)S[row.scope]=row.data;});saveLocal();}
    SS('synced');
  }catch(e){SS('error');}
  renderAll();
}
async function saveToCloud(){
  try{
    for(const sc of['personal','books','habits','finance','health']){
      const data=sc==='personal'?S.personal:S[sc];
      await fetch(`${SB_URL}/rest/v1/dashboard`,{method:'POST',headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':'application/json',Prefer:'resolution=merge-duplicates'},body:JSON.stringify({id:sc,scope:sc,data,updated_at:new Date().toISOString()})});
    }
    SS('synced');const b=$('sync-banner');b.classList.add('show');setTimeout(()=>b.classList.remove('show'),2000);
  }catch(e){SS('error');}
}

function dailyQuote(){const d=new Date();return QUOTES[(d.getFullYear()*366+d.getMonth()*31+d.getDate())%QUOTES.length];}

function timeProgress(){
  const now=new Date(),y=now.getFullYear(),mo=now.getMonth(),d=now.getDate(),h=now.getHours(),mi=now.getMinutes();
  const soy=new Date(y,0,1),eoy=new Date(y+1,0,1);
  const doy=Math.floor((now-soy)/86400000)+1,diy=Math.round((eoy-soy)/86400000);
  const dim=new Date(y,mo+1,0).getDate();
  const dow=now.getDay();
  const sqm=[0,3,6,9][Math.floor(mo/3)];
  const sq=new Date(y,sqm,1),eq=new Date(y,sqm+3,1);
  return[
    {label:'Year',val:`${doy}/${diy}`,pct:Math.round(doy/diy*100)},
    {label:'Month',val:`${d}/${dim}`,pct:Math.round(d/dim*100)},
    {label:'Week',val:`${dow||7}/7`,pct:Math.round((dow||7)/7*100)},
    {label:'Day',val:`${h}:${String(mi).padStart(2,'0')}`,pct:Math.round((h*60+mi)/(24*60)*100)},
    {label:'Quarter',val:`${Math.floor((now-sq)/86400000)+1}/${Math.round((eq-sq)/86400000)}`,pct:Math.min(100,Math.round((now-sq)/(eq-sq)*100))},
    {label:'Life',val:'30/80',pct:38},
  ];
}

  if(isDay)return`<svg width="150" height="150" viewBox="0 0 150 150" style="border-radius:50%;box-shadow:0 2px 14px rgba(0,0,0,.12)"><defs><radialGradient id="sk" cx="50%" cy="40%" r="60%"><stop offset="0%" stop-color="${skyTop}"/><stop offset="100%" stop-color="${skyBot}"/></radialGradient><clipPath id="cl"><circle cx="75" cy="75" r="75"/></clipPath></defs><circle cx="75" cy="75" r="75" fill="url(#sk)"/><g clip-path="url(#cl)"><ellipse cx="75" cy="138" rx="85" ry="28" fill="${isDusk?'#c8a880':'#a8d4a0'}"/><ellipse cx="35" cy="134" rx="50" ry="18" fill="${isDusk?'#b89870':'#88c488'}"/><ellipse cx="115" cy="134" rx="50" ry="18" fill="${isDusk?'#c0a478':'#98cc98'}"/><circle cx="75" cy="48" r="20" fill="${isDawn?'#f9a825':isDusk?'#f4511e':'#fff176'}" opacity=".95"/><circle cx="75" cy="48" r="26" fill="${isDawn?'#f9a825':isDusk?'#f4511e':'#fff9c4'}" opacity=".2"/>${[0,45,90,135].map(a=>{const rad=a*Math.PI/180;return`<line x1="${75+Math.cos(rad)*29}" y1="${48+Math.sin(rad)*29}" x2="${75+Math.cos(rad)*36}" y2="${48+Math.sin(rad)*36}" stroke="${isDusk?'#f4511e':'#ffe082'}" stroke-width="2.5" stroke-linecap="round" opacity=".7"/>`;}).join('')}<g opacity=".85"><ellipse cx="104" cy="65" rx="17" ry="9" fill="#fff"/><ellipse cx="115" cy="67" rx="11" ry="7" fill="#fff"/><ellipse cx="93" cy="67" rx="11" ry="7" fill="#fff"/></g><g opacity=".65"><ellipse cx="35" cy="74" rx="13" ry="7" fill="#fff"/><ellipse cx="44" cy="76" rx="10" ry="6" fill="#fff"/><ellipse cx="26" cy="76" rx="9" ry="5" fill="#fff"/></g></g><circle cx="75" cy="75" r="74" fill="none" stroke="rgba(0,0,0,.07)" stroke-width="2"/></svg>`;
  return`<svg width="150" height="150" viewBox="0 0 150 150" style="border-radius:50%;box-shadow:0 2px 14px rgba(0,0,0,.15)"><defs><radialGradient id="sk" cx="50%" cy="40%" r="60%"><stop offset="0%" stop-color="${skyTop}"/><stop offset="100%" stop-color="${skyBot}"/></radialGradient><clipPath id="cl"><circle cx="75" cy="75" r="75"/></clipPath></defs><circle cx="75" cy="75" r="75" fill="url(#sk)"/><g clip-path="url(#cl)">${[[28,22],[52,16],[98,20],[128,28],[18,58],[138,52],[108,72],[42,68],[122,88],[57,37],[88,32]].map(([x,y],i)=>`<circle cx="${x}" cy="${y}" r="${i%3===0?1.5:1}" fill="white" opacity="${0.4+(x*y%10)/20}"/>`).join('')}<circle cx="88" cy="50" r="22" fill="#e8e0c8"/><circle cx="98" cy="46" r="18" fill="${skyBot}"/><circle cx="80" cy="56" r="2.5" fill="#d0c8b0" opacity=".5"/><circle cx="92" cy="42" r="1.5" fill="#d0c8b0" opacity=".4"/><ellipse cx="75" cy="140" rx="85" ry="26" fill="#0f1f0f"/><ellipse cx="30" cy="136" rx="48" ry="16" fill="#0a180a"/><ellipse cx="118" cy="136" rx="48" ry="16" fill="#0e1c0e"/></g><circle cx="75" cy="75" r="74" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="2"/></svg>`;
}

function updateClock(){
  const now=new Date(),h=now.getHours(),mi=String(now.getMinutes()).padStart(2,'0');
  const h12=String(h%12||12).padStart(2,'0'),ampm=h>=12?'PM':'AM';
  const dayName=['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'][now.getDay()];
  const hEl=$('clock-h'),mEl=$('clock-m'),aEl=$('clock-ampm'),dEl=$('clock-day');
  if(hEl)hEl.textContent=h12;if(mEl)mEl.textContent=mi;if(aEl)aEl.textContent=ampm;if(dEl)dEl.textContent=dayName;
}

function wkDate(di){const d=new Date(),t=new Date(d);t.setDate(d.getDate()+(di-d.getDay()));return t.getDate();}

function parseICal(txt){
  const evs=[];
  const lines=txt.replace(/\r\n/g,'\n').replace(/\r/g,'\n').replace(/\n /g,'').split('\n');
  let ev=null;
  for(const l of lines){
    if(l==='BEGIN:VEVENT')ev={};
    else if(l==='END:VEVENT'&&ev){if(ev.start&&ev.title)evs.push(ev);ev=null}
    else if(ev){
      if(l.startsWith('SUMMARY:'))ev.title=l.slice(8).trim();
      else if(l.startsWith('LOCATION:'))ev.location=l.slice(9).trim();
      else if(l.startsWith('DTSTART')){
        const v=l.split(':').slice(1).join(':');if(!v)continue;
        const y=v.slice(0,4),mo=v.slice(4,6),d=v.slice(6,8),ad=v.length===8;
        ev.allDay=ad;
        ev.start=ad?new Date(+y,+mo-1,+d):new Date(+y,+mo-1,+d,+(v.slice(9,11)||0),+(v.slice(11,13)||0));
      }
      else if(l.startsWith('DTEND')){
        const v=l.split(':').slice(1).join(':');if(!v)continue;
        const y=v.slice(0,4),mo=v.slice(4,6),d=v.slice(6,8),ad=v.length===8;
        ev.end=ad?new Date(+y,+mo-1,+d):new Date(+y,+mo-1,+d,+(v.slice(9,11)||0),+(v.slice(11,13)||0));
      }
    }
  }
  return evs.sort((a,b)=>a.start-b.start);
}
async function loadCal(){
  try{const r=await fetch(ICAL);const d=await r.json();calEvs=parseICal(d.contents||'');}catch(e){calEvs=[];}
  calLoaded=true;
  if(nav==='calendar')rCal();else rHome();
}
function rCal(){
  const el=$('view-calendar');if(!el)return;
  if(!calLoaded){el.innerHTML='<div class="section-title">Calendar</div><div class="card"><div class="empty">loading…</div></div>';loadCal();return;}
  const now=new Date(),y=calDate.getFullYear(),mo=calDate.getMonth();
  const sel=calSel||now;
  const selEvs=calEvs.filter(e=>{const d=e.start;return d.getFullYear()===sel.getFullYear()&&d.getMonth()===sel.getMonth()&&d.getDate()===sel.getDate()});
  const first=new Date(y,mo,1).getDay(),days=new Date(y,mo+1,0).getDate();
  let cells='';
  for(let i=0;i<first;i++){const p=new Date(y,mo,-(first-1-i));cells+=`<div class="cal-day om"><div class="cal-dn">${p.getDate()}</div></div>`;}
  for(let d=1;d<=days;d++){
    const isT=now.getFullYear()===y&&now.getMonth()===mo&&now.getDate()===d;
    const isS=sel.getFullYear()===y&&sel.getMonth()===mo&&sel.getDate()===d;
    const hasEv=calEvs.some(e=>e.start.getFullYear()===y&&e.start.getMonth()===mo&&e.start.getDate()===d);
    cells+=`<div class="cal-day${isT?' today':''}${hasEv?' has-ev':''}${isS?' sel':''}" onclick="calSel=new Date(${y},${mo},${d});rCal()">
      <div class="cal-dn">${d}</div>${hasEv?'<div class="cal-dot"></div>':''}
    </div>`;
  }
  el.innerHTML=`
    <div class="section-title">Calendar</div>
    <div class="card" style="margin-bottom:14px">
      <div class="cal-nav-row">
        <button class="cal-nav-btn" onclick="calDate=new Date(${y},${mo-1},1);rCal()">‹</button>
        <span class="cal-month">${calDate.toLocaleDateString('en-US',{month:'long',year:'numeric'})}</span>
        <button class="cal-nav-btn" onclick="calDate=new Date(${y},${mo+1},1);rCal()">›</button>
      </div>
      <div class="cal-grid">${WK.map(d=>`<div class="cal-dl">${d}</div>`).join('')}${cells}</div>
    </div>
    <div class="card">
      <div class="card-title">${sel.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>
      ${selEvs.length===0?'<div class="empty">no events</div>':selEvs.map(e=>`
        <div class="ev-item"><div class="ev-dot"></div>
          <div><div class="ev-title">${esc(e.title)}</div>
          <div class="ev-time">${e.allDay?'all day':e.start.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}${e.end&&!e.allDay?' – '+e.end.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}):''}</div>
          ${e.location?`<div class="ev-time">📍 ${esc(e.location)}</div>`:''}
          </div>
        </div>`).join('')}
    </div>`;
}

function wkChecks(h){const wk=wkKey();if(!h.weeks)h.weeks={};if(!h.weeks[wk])h.weeks[wk]=[false,false,false,false,false,false,false];return h.weeks[wk]}
function calcStreak(h){if(!h.weeks)return 0;const keys=Object.keys(h.weeks).sort();let s=0;for(let k=keys.length-1;k>=0;k--){if(h.weeks[keys[k]].filter(Boolean).length>=h.target)s++;else break;}return s}
function wkDate(di){const d=new Date(),t=new Date(d);t.setDate(d.getDate()+(di-d.getDay()));return t.getDate()}

function rHabits(){
  const el=$('view-habits'),tod=DOW();

    </div>
    ${S.habits.length===0?'<div class="card"><div class="empty">no habits yet</div></div>':
    S.habits.map((h,i)=>{const c=wkChecks(h),done=c.filter(Boolean).length,streak=calcStreak(h);return`
      <div class="card" style="margin-bottom:12px">
        <div class="habit-top">
          <div><div class="habit-name">${esc(h.name)}</div><div style="font-size:11px;color:var(--text3);;margin-top:2px">${h.target}×/week · ${done}/${h.target}</div></div>
          <div style="display:flex;align-items:center;gap:10px"><span class="streak">🔥 ${streak}wk</span><button class="del" onclick="delHabit(${i})">✕</button></div>
        </div>
        <div class="wk-dots">${WK.map((day,di)=>`
          <div class="wk-dot${c[di]?' done':''}${di===tod&&!c[di]?' today':''}" onclick="togHabit(${i},${di})">
            <span>${day}</span><span style="font-size:7px;opacity:.6">${wkDate(di)}</span>
          </div>`).join('')}
        </div>
        <div class="pbar" style="margin-top:10px"><div class="pbar-fill" style="width:${Math.min(100,Math.round(done/h.target*100))}%;background:${done>=h.target?'var(--green)':'var(--sage)'}"></div></div>
      </div>`;}).join('')}`;
}
function addHabit(){const i=$('hni'),t=$('htgt'),n=i.value.trim();if(!n)return;S.habits.push({name:n,target:parseInt(t.value),weeks:{},createdDate:todayStr()});i.value='';rHabits();sched()}
function togHabit(hi,di){const c=wkChecks(S.habits[hi]);c[di]=!c[di];rHabits();if(nav==='home')rHome();sched()}
function delHabit(i){S.habits.splice(i,1);rHabits();sched()}

// ══════════════════════════════════════════════════════════════════════════════
// FINANCE
// ══════════════════════════════════════════════════════════════════════════════
function rFinance(){
  const el=$('view-finance');
  const fin=S.finance;if(!fin.transactions)fin.transactions=[];if(!fin.budgets)fin.budgets=[];
  const now=new Date(),mo=now.getMonth(),yr=now.getFullYear();
  const txMo=fin.transactions.filter(t=>{const d=new Date(t.date);return d.getMonth()===mo&&d.getFullYear()===yr});
  const inc=txMo.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp=txMo.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const net=inc-exp;
  const filtered=finCat==='All'?[...fin.transactions].reverse():[...fin.transactions].reverse().filter(t=>t.category===finCat);
  const budgets=fin.budgets.map(b=>{const sp=txMo.filter(t=>t.type==='expense'&&t.category===b.category).reduce((s,t)=>s+t.amount,0);return{...b,spent:sp,pct:Math.min(100,Math.round(sp/b.limit*100))};});
  el.innerHTML=`
    <div class="section-title">Finance</div>
    <div class="fin-row">
      <div class="fin-card"><div class="fin-val" style="color:var(--green)">${$M(inc)}</div><div class="fin-lbl">income</div></div>
      <div class="fin-card"><div class="fin-val" style="color:var(--red)">${$M(exp)}</div><div class="fin-lbl">expenses</div></div>
      <div class="fin-card"><div class="fin-val" style="color:${net>=0?'var(--green)':'var(--red)'}">${$M(net)}</div><div class="fin-lbl">net</div></div>
    </div>
    ${budgets.length?`<div class="card" style="margin-bottom:14px"><div class="card-title">budgets</div>${budgets.map(b=>`<div class="bud-row"><div class="bud-top"><span>${b.category}</span><span>${$M(b.spent)} / ${$M(b.limit)}</span></div><div class="pbar"><div class="pbar-fill" style="width:${b.pct}%;background:${b.pct>=90?'var(--red)':b.pct>=70?'var(--amber)':'var(--sage)'}"></div></div></div>`).join('')}</div>`:''}
    <div class="card" style="margin-bottom:14px">
      <div class="card-title">add transaction</div>
      <div class="inp-row" style="flex-wrap:wrap;gap:8px">
        <input type="text" id="txn" placeholder="description…" style="flex:1;min-width:120px"/>
        <input type="number" id="txa" placeholder="amount" style="width:100px" step="0.01" min="0"/>
        <input type="date" id="txd" value="${isoToday()}" style="width:140px"/>
      </div>
      <div class="inp-row" style="margin-top:8px">
        <select id="txt" style="width:auto" onchange="updTC()"><option value="expense">expense</option><option value="income">income</option></select>
        <select id="txc" style="flex:1">${TX_CATS.map(c=>`<option>${c}</option>`).join('')}</select>
        <button class="btn" onclick="addTx()">+</button>
      </div>
    </div>
    <div class="card" style="margin-bottom:14px">
      <div class="card-title">set budget</div>
      <div class="inp-row">
        <select id="bdc" style="flex:1">${TX_CATS.map(c=>`<option>${c}</option>`).join('')}</select>
        <input type="number" id="bdl" placeholder="monthly limit" style="width:130px" min="0"/>
        <button class="btn" onclick="addBudget()">set</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">transactions <span style="font-size:11px;color:var(--text3);">${filtered.length}</span></div>
      <div class="cat-row">${['All',...TX_CATS,'💰 Income'].map(c=>`<button class="cat-chip${finCat===c?' active':''}" onclick="finCat='${c}';rFinance()">${c}</button>`).join('')}</div>
      ${filtered.length===0?'<div class="empty">none yet</div>':filtered.slice(0,30).map(t=>`
        <div class="tx-row">
          <div class="tx-ic">${TX_ICONS[t.category]||'◇'}</div>
          <div style="flex:1"><div class="tx-name">${esc(t.name)}</div><div class="tx-cat">${t.category} · ${t.date}</div></div>
          <div class="tx-amt ${t.type==='income'?'inc':'exp'}">${t.type==='income'?'+':'-'}${$M(t.amount)}</div>
          <button class="del" onclick="delTx(${fin.transactions.indexOf(t)})">✕</button>
        </div>`).join('')}
    </div>`;
}
function updTC(){const t=$('txt').value,s=$('txc');s.innerHTML=t==='income'?'<option>💰 Income</option>':TX_CATS.map(c=>`<option>${c}</option>`).join('')}
function addTx(){const n=$('txn').value.trim(),a=parseFloat($('txa').value),d=$('txd').value,t=$('txt').value,c=$('txc').value;if(!n||!a||!d)return;S.finance.transactions.push({name:n,amount:a,date:d,type:t,category:c});$('txn').value='';$('txa').value='';rFinance();sched()}
function delTx(i){S.finance.transactions.splice(i,1);rFinance();sched()}
function addBudget(){const c=$('bdc').value,l=parseFloat($('bdl').value);if(!l)return;const ex=S.finance.budgets.findIndex(b=>b.category===c);if(ex>=0)S.finance.budgets[ex].limit=l;else S.finance.budgets.push({category:c,limit:l});$('bdl').value='';rFinance();sched()}

// ══════════════════════════════════════════════════════════════════════════════
// HEALTH
// ══════════════════════════════════════════════════════════════════════════════
function scoreRing(score,col){
  const r=20,circ=2*Math.PI*r,dash=score?Math.round(score/100*circ):0;
  return`<div class="score-wrap"><svg viewBox="0 0 48 48" width="48" height="48"><circle cx="24" cy="24" r="${r}" fill="none" stroke="var(--border)" stroke-width="3.5"/><circle cx="24" cy="24" r="${r}" fill="none" stroke="${col}" stroke-width="3.5" stroke-dasharray="${dash} ${circ}" stroke-linecap="round"/></svg><div class="score-num">${score||'—'}</div></div>`;
}
function rHealth(){
  const el=$('view-health');
  const logs=[...S.health].reverse(),lh=logs[0];
  el.innerHTML=`
    <div class="section-title">Health</div>
    ${lh?`<div class="health-row">
      <div class="hm">${scoreRing(lh.readinessScore,'var(--sage)')}<div class="hm-lbl">readiness</div></div>
      <div class="hm">${scoreRing(lh.sleepScore,'var(--text)')}<div class="hm-lbl">sleep score</div></div>
      <div class="hm"><div class="hm-icon">💓</div><div class="hm-val">${lh.hrv||'—'}</div><div class="hm-lbl">hrv</div></div>
      <div class="hm"><div class="hm-icon">👣</div><div class="hm-val" style="font-size:14px">${lh.steps?lh.steps.toLocaleString():'—'}</div><div class="hm-lbl">steps</div></div>
    </div>`:''}
    <div class="card" style="margin-bottom:14px">
      <div class="card-title">log oura data</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <input type="date" id="hd" value="${isoToday()}"/>
        <input type="number" id="hr" placeholder="readiness (0–100)" min="0" max="100"/>
        <input type="number" id="hss" placeholder="sleep score (0–100)" min="0" max="100"/>
        <input type="number" id="hsh" placeholder="sleep hours" step="0.1"/>
        <input type="number" id="hh" placeholder="hrv (ms)"/>
        <input type="number" id="hrr" placeholder="resting hr"/>
        <input type="number" id="hst" placeholder="steps"/>
        <input type="number" id="hsp" placeholder="spo₂ %" step="0.1"/>
        <input type="number" id="ht" placeholder="temp deviation" step="0.1"/>
        <input type="number" id="hw" placeholder="weight (lbs)" step="0.1"/>
      </div>
      <div class="inp-row"><button class="btn" onclick="logHealth()">save</button></div>
    </div>
    <div class="card">
      <div class="card-title">history <span style="font-size:11px;color:var(--text3);">${S.health.length} entries</span></div>
      ${S.health.length===0?'<div class="empty">none yet</div>':logs.slice(0,10).map((e,i)=>`
        <div class="hl-row">
          <span class="hl-date">${e.date}</span>
          <div class="hl-stats">
            <div class="hl-s"><div class="hl-sv">${e.readinessScore||'—'}</div><div class="hl-sl">ready</div></div>
            <div class="hl-s"><div class="hl-sv">${e.sleepScore||'—'}</div><div class="hl-sl">sleep</div></div>
            <div class="hl-s"><div class="hl-sv">${e.hrv||'—'}</div><div class="hl-sl">hrv</div></div>
            <div class="hl-s"><div class="hl-sv">${e.steps?Math.round(e.steps/1000)+'k':'—'}</div><div class="hl-sl">steps</div></div>
            <button class="del" onclick="delHealth(${S.health.length-1-i})">✕</button>
          </div>
        </div>`).join('')}
    </div>`;
}
function logHealth(){
  const g=id=>$(id)?.value;
  const entry={date:g('hd')||isoToday(),readinessScore:parseInt(g('hr'))||null,sleepScore:parseInt(g('hss'))||null,sleepHours:parseFloat(g('hsh'))||null,hrv:parseInt(g('hh'))||null,restingHR:parseInt(g('hrr'))||null,steps:parseInt(g('hst'))||null,spo2:parseFloat(g('hsp'))||null,tempDev:parseFloat(g('ht'))||null,weight:parseFloat(g('hw'))||null};
  const ex=S.health.findIndex(e=>e.date===entry.date);
  if(ex>=0)S.health[ex]=entry;else S.health.push(entry);
  S.health.sort((a,b)=>a.date.localeCompare(b.date));
  rHealth();sched();
}
function delHealth(i){S.health.splice(i,1);rHealth();sched()}

// ── Boot ──────────────────────────────────────────────────────────────────────
load();
if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});

</script>
</body>
